<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Timer & UI Refresh Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .timer-ring {
            transition: stroke-dashoffset 1s linear;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-8">

    <!-- Correct/Wrong Text Comparison -->
    <div class="space-y-12 text-center mb-20">
        <div class="space-y-4">
            <p class="text-xs font-black uppercase tracking-[0.5em] text-gray-500">New Correct State</p>
            <h2 class="text-7xl font-black italic tracking-tighter text-white uppercase drop-shadow-[0_0_50px_rgba(255,255,255,0.2)]">
                CORRECT
            </h2>
        </div>
        
        <div class="space-y-4">
            <p class="text-xs font-black uppercase tracking-[0.5em] text-gray-500">New Wrong State</p>
            <h2 class="text-7xl font-black italic tracking-tighter text-gray-800 uppercase">
                WRONG
            </h2>
        </div>
    </div>

    <!-- Circular Timer Mockup -->
    <div class="fixed bottom-12 right-12 flex flex-col items-center">
        <p class="text-[9px] font-black uppercase tracking-[0.3em] text-gray-500 mb-4">Circular Timer</p>
        <div class="relative w-24 h-24 flex items-center justify-center">
            <svg class="w-full h-full -rotate-90" viewBox="0 0 100 100">
                <circle
                    cx="50"
                    cy="50"
                    r="40"
                    stroke="rgba(255,255,255,0.1)"
                    stroke-width="6"
                    fill="transparent"
                />
                <circle
                    class="timer-ring"
                    cx="50"
                    cy="50"
                    r="40"
                    stroke="white"
                    stroke-width="6"
                    fill="transparent"
                    stroke-dasharray="251.2"
                    stroke-dashoffset="60"
                    stroke-linecap="round"
                />
            </svg>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-1.5 h-1.5 bg-white rounded-full animate-pulse shadow-[0_0_15px_white]"></div>
            </div>
        </div>
    </div>

    <!-- Mobile Spacing Comparison -->
    <div class="max-w-xs w-full glass p-6 rounded-[2rem] space-y-6">
        <p class="text-[10px] font-black uppercase tracking-widest text-center text-gray-500">Mobile Layout (Tightened)</p>
        <div class="bg-white/5 h-20 rounded-xl flex items-center justify-center font-black italic uppercase text-sm">Question Area</div>
        <div class="grid grid-cols-2 gap-3">
             <div class="bg-white/5 h-12 rounded-lg flex items-center justify-center text-[10px] font-bold">Option A</div>
             <div class="bg-white/5 h-12 rounded-lg flex items-center justify-center text-[10px] font-bold">Option B</div>
        </div>
        <div class="pt-4 border-t border-white/5">
             <div class="bg-white text-black h-12 rounded-lg flex items-center justify-center font-black italic text-xs uppercase tracking-tighter">Submit</div>
        </div>
    </div>

</body>
</html>
